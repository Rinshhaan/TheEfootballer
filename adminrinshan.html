<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard – getnow shop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="images/getnowshop.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- CryptoJS for secure hashing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>

<body class="page-admin">

    <!-- ══ ADMIN LOGIN OVERLAY ══ -->
    <div id="adminLoginOverlay" class="admin-login-overlay">
        <div class="login-card">
            <div class="login-header">
                <i class="fa-solid fa-lock"></i>
                <h2>Admin Login</h2>
            </div>
            <form id="adminLoginForm">
                <input type="password" id="adminPass" placeholder="Enter Access Password" required>
                <button type="submit" class="login-btn">Unlock Dashboard</button>
            </form>
            <p id="loginError" class="login-error"></p>
        </div>
    </div>

    <!-- ══ NAVBAR ══ -->
    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <i class="fa-solid fa-gamepad"></i>
            <span>getnow <strong>admin</strong></span>
        </a>
        <div class="nav-actions">
            <button id="adminAuthBtn" class="auth-toggle-btn">
                <i class="fa-solid fa-right-to-bracket"></i>
                <span id="authBtnText">Login</span>
            </button>
        </div>
    </nav>

    <main class="main-content admin-page" style="display: none;" id="adminMainContent">
        <div class="admin-header">
            <div class="header-left">
                <h1 class="admin-title">Marketplace Manager</h1>
                <div id="adminUser" class="admin-user-info">Admin Account</div>
            </div>
            <div class="admin-search-wrap">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="adminSearch" placeholder="Search by name, price, owner, ID...">
            </div>
        </div>

        <!-- TABS -->
        <div class="admin-tabs">
            <button class="admin-tab active" data-tab="waiting">
                <i class="fa-solid fa-clock-rotate-left"></i> Waiting
            </button>
            <button class="admin-tab" data-tab="current">
                <i class="fa-solid fa-list-check"></i> Current
            </button>
            <button class="admin-tab" data-tab="auctioned">
                <i class="fa-solid fa-gavel"></i> Auctioned
            </button>
            <button class="admin-tab" data-tab="sold">
                <i class="fa-solid fa-check-double"></i> Sold Out
            </button>
        </div>

        <!-- TAB CONTENT -->
        <div id="tab-waiting" class="admin-tab-content active">
            <div id="waitingList" class="admin-list">
                <!-- Items injected here -->
                <p class="loading-msg">Fetching waiting IDs...</p>
            </div>
        </div>

        <div id="tab-current" class="admin-tab-content">
            <div id="currentList" class="admin-list">
                <p class="loading-msg">Fetching active listings...</p>
            </div>
        </div>

        <div id="tab-auctioned" class="admin-tab-content">
            <div id="auctionedList" class="admin-list">
                <p class="loading-msg">Fetching auctions...</p>
            </div>
        </div>

        <div id="tab-sold" class="admin-tab-content">
            <div id="soldList" class="admin-list">
                <p class="loading-msg">Fetching sold IDs...</p>
            </div>
            <!-- REVENUE CARD -->
            <div class="admin-revenue-card">
                <div class="revenue-info">
                    <h4>Total Revenue Generated</h4>
                    <div class="revenue-amount" id="totalRevenue">₹0</div>
                </div>
                <div class="revenue-icon">
                    <i class="fa-solid fa-sack-dollar"></i>
                </div>
            </div>
        </div>
    </main>

    <!-- EDIT MODAL (for admin to adjust before posting) -->
    <div class="admin-edit-modal" id="adminEditModal">
        <div class="modal-content">
            <h3>Review ID Details</h3>
            <form id="adminEditForm">
                <input type="hidden" id="editItemId">
                <input type="hidden" id="editItemType">

                <div class="form-group">
                    <label>Title / Description</label>
                    <input type="text" id="editTitle" required>
                </div>
                <div class="form-group">
                    <label>Paid Players (formatted as x)</label>
                    <textarea id="editPlayers" required></textarea>
                </div>
                <div class="form-group row-group">
                    <div class="input-wrap">
                        <label>Price (₹)</label>
                        <input type="number" id="editPrice" required>
                    </div>
                </div>
                <div class="form-group row-group">
                    <div class="input-wrap">
                        <label>Seller Name</label>
                        <input type="text" id="editSellerName" required>
                    </div>
                    <div class="input-wrap">
                        <label>WhatsApp Number</label>
                        <input type="text" id="editSellerWa" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Target Section / Category (Home Page)</label>
                    <select id="editSection"
                        style="width: 100%; padding: 12px; border-radius: 8px; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(0,240,255,0.2);">
                        <option value="auto">Default (Auto-categorize by Price)</option>
                        <option value="hot">🔥 Hot Deals</option>
                        <option value="budget">💰 Budget Friendly</option>
                        <option value="beast">💪 Beast Ones</option>
                    </select>
                </div>
                <div class="form-group" style="margin-top: 10px;">
                    <label class="checkbox-wrap">
                        <input type="checkbox" id="editStock">
                        <span>Mark as Sold Out</span>
                    </label>
                </div>
                <div class="form-group" style="margin-top: 10px;">
                    <label>Manage Media (Delete to Remove)</label>
                    <div id="editMediaGallery" class="edit-media-gallery">
                        <!-- Previews injected via JS -->
                    </div>
                </div>
                <div class="form-group" style="margin-top: 15px;">
                    <label>Add New Media (File Upload)</label>
                    <div class="upload-area" id="editUploadArea">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <p>Click to Upload New Media</p>
                        <input type="file" id="editFileInput" style="display: none;" multiple accept="image/*,video/*">
                    </div>
                    <div id="editUploadStatus" style="font-size: 0.75rem; color: var(--accent); margin-top: 5px;">
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="cancel-btn" id="closeAdminModal">Cancel</button>
                    <button type="submit" class="save-btn">Approve & Post</button>
                </div>
            </form>
        </div>
    </div>

    <!-- FEEDBACK SYSTEM -->
    <div id="toastContainer"></div>

    <!-- ══ BOTTOM TAB BAR ══ -->
    <nav class="tab-bar">
        <a href="index.html" class="tab-item">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <a href="buy.html" class="tab-item">
            <i class="fa-solid fa-bag-shopping"></i>
            <span>Buy</span>
        </a>
        <a href="sell.html" class="tab-item">
            <i class="fa-solid fa-tag"></i>
            <span>Sell</span>
        </a>
        <a href="adminrinshan.html" class="tab-item active">
            <i class="fa-solid fa-user-shield"></i>
            <span>Admin</span>
        </a>
    </nav>

    <script type="module" src="adminrinshan.js"></script>
</body>

</html>
