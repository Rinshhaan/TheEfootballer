                    Auctions/Giveaways</button>
            </div>

            <!-- Price range dropdown (only for Shop IDs) -->
            <div class="price-dropdown" id="priceDropdown">
                <button class="price-dropdown-btn" id="priceDropdownBtn" type="button">
                    <i class="fa-solid fa-sliders"></i>
                    <span id="priceDisplay">Price: ₹0 — ₹5000</span>
                    <i class="fa-solid fa-chevron-down price-chevron" id="priceChevron"></i>
                </button>
                <div class="price-dropdown-panel" id="priceDropdownPanel">
                    <p class="panel-label">Drag to set price range</p>
                    <div class="dual-range-container">
                        <div class="range-track-bg"></div>
                        <div class="range-track-fill" id="rangeFill"></div>
                        <input type="range" id="rangeMin" min="0" max="5000" value="0" step="50">
                        <input type="range" id="rangeMax" min="0" max="5000" value="5000" step="50">
                    </div>
                    <div class="range-step-labels">
                        <span>₹0</span>
                        <span>₹2500</span>
                        <span>₹5000</span>
                    </div>
                </div>
            </div>
        </div>
